<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06b6d4" />
    <title>JARVIS offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e2e8f0;
        background: linear-gradient(135deg, #020617, #07111f 60%, #050816);
      }
      main {
        width: min(88vw, 460px);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 24px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 { margin: 0 0 10px; color: white; }
      p { margin: 0; line-height: 1.6; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <main>
      <h1>JARVIS offline</h1>
      <p>Sem conexao agora. Dados privados da API nao sao armazenados em cache. Reconecte para conversar, sincronizar tarefas e consultar informacoes sensiveis.</p>
    </main>
  </body>
</html>
