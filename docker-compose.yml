services:
  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres
    environment:
      POSTGRES_DB: jarvis_db
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis_password
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - jarvis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: jarvis-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://jarvis:jarvis_password@postgres:5432/jarvis_db?schema=public
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-3001}:3001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: jarvis-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-5173}:5173"

volumes:
  jarvis_postgres_data:
